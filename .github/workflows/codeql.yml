name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "21 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: codeql-analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fee9466b8957867761f2d78f922ab084e3e2dd17
        with:
          languages: csharp
          build-mode: manual

      - name: Restore
        run: dotnet restore RepoTrustDoctor.slnx

      - name: Build
        run: dotnet build RepoTrustDoctor.slnx --configuration Release --no-restore

      - name: Analyze
        uses: github/codeql-action/analyze@fee9466b8957867761f2d78f922ab084e3e2dd17
        with:
          category: "/language:csharp"
