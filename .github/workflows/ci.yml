name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Apps/RepoTrustDoctor.Web/package-lock.json

      - name: Restore
        run: dotnet restore RepoTrustDoctor.slnx --locked-mode

      - name: Build
        run: dotnet build RepoTrustDoctor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RepoTrustDoctor.slnx --configuration Release --no-build

      - name: CLI smoke test
        run: dotnet run --project src/Apps/RepoTrustDoctor.Cli/RepoTrustDoctor.Cli.csproj --configuration Release -- scan . --format console

      - name: Install web dependencies
        working-directory: src/Apps/RepoTrustDoctor.Web
        run: npm ci

      - name: Test web workbench
        working-directory: src/Apps/RepoTrustDoctor.Web
        run: npm test

      - name: Build web workbench
        working-directory: src/Apps/RepoTrustDoctor.Web
        run: npm run build

  web-visual:
    name: web-visual
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Apps/RepoTrustDoctor.Web/package-lock.json

      - name: Install web dependencies
        working-directory: src/Apps/RepoTrustDoctor.Web
        run: npm ci

      - name: Install browser
        working-directory: src/Apps/RepoTrustDoctor.Web
        run: npx playwright install chromium

      - name: Test workbench layouts
        working-directory: src/Apps/RepoTrustDoctor.Web
        run: npm run test:visual
