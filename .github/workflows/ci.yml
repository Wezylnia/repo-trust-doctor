name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore RepoTrustDoctor.slnx --locked-mode

      - name: Build
        run: dotnet build RepoTrustDoctor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RepoTrustDoctor.slnx --configuration Release --no-build

      - name: CLI smoke test
        run: dotnet run --project src/Apps/RepoTrustDoctor.Cli/RepoTrustDoctor.Cli.csproj --configuration Release -- scan . --format console
